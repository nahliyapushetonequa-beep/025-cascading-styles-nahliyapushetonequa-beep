<html>

<head>
    <title>Cascading Styles</title>
    <style>
        .text-area {
            color: hotpink;
        }

        p {
            color: purple !important;
        }
    </style>
</head>

<body>
    <p style="color: purple;" class="text-area">chicken chicken chicken chicken</p>
</body>

</html>
